schema_version: 1
name: raydium
version: "0.2.0"
description: "Raydium AMM plugin for token swaps, price queries, and pool info on Solana. Trigger phrases: swap on raydium, raydium swap, raydium price, raydium pool, raydium dex."
author:
  name: skylavis-sky
  github: skylavis-sky
category: defi-protocol
tags:
  - solana
  - dex
  - amm
  - swap
  - raydium
license: MIT

components:
  skill:
    dir: .

build:
  lang: rust
  binary_name: raydium

api_calls:
  - "https://api-v3.raydium.io"
  - "https://transaction-v1.raydium.io"
