schema_version: 1
name: polymarket-plugin
version: "0.5.1"
description: "Trade prediction markets on Polymarket — buy and sell YES/NO outcome tokens on Polygon"
author:
  name: skylavis-sky
  github: skylavis-sky
category: defi-protocol
tags:
  - prediction-market
  - polymarket
  - polygon
  - trading
  - defi
  - clob
license: MIT

components:
  skill:
    dir: .

build:
  lang: rust
  binary_name: polymarket-plugin

api_calls:
